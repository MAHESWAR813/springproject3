<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="base::layout(~{::section})">
<head>
<meta charset="UTF-8">
<title>Home</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>
<body>

<section class="form">
<h1 > Register Here..</h1>
<div class="formBackground">
<div class="row" >
<form action="" th:action="@{/do_register}" method="post" th:object="${User}">
  <div class="form-row">
    <div class="form-group col-md-6 ">
      <label for="inputEmail4">User Name</label>
      <input type="text" class="form-control" id="name" placeholder="Enter your name" required th:value="${user.name} " name="name">
    </div>
    <div class="form-group col-md-6">
      <label for="inputPassword4">Email</label>
      <input type="email" class="form-control" id="email" placeholder="Enter email" required th:value="${user.email}" name="email">
    </div>
    <div class="form-group col-md-6">
      <label for="inputPassword4">Password</label>
      <input type="password" class="form-control" id="password" placeholder="Enter password" required name="password">
    </div>
  </div>
  <div class="form-group">
    <label for="inputAddress">About</label>
    <input type="text" class="form-control" id="inputAddress"  rows="10" placeholder="Enter something yourself" name="about">
  </div>
  
  <div class="form-group">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="gridCheck" name="agreement">
      <label class="form-check-label" for="gridCheck">
        Check me out
      </label>
    </div>
  </div>
  <button type="submit" class="btn ">SignUp</button>
  <button type="reset" class="btn">reset</button>
</form>
</div>
</div>
</section>



</body>
</html>
